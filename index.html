<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Распределение по тирам</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0c0f;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Шапка */
        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            color: #ffffff;
            font-size: 48px;
            font-weight: 800;
            text-shadow: 0 0 20px rgba(0,255,255,0.3);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle {
            color: #8099a7;
            font-size: 18px;
            font-weight: 300;
        }

        /* Статистика */
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: #1a1e24;
            padding: 20px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            animation: slideDown 0.5s ease;
            border: 1px solid #2a2f38;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 800;
            color: #64b5f6;
            line-height: 1.2;
        }

        .stat-label {
            color: #8099a7;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Сетка тиров */
        .tiers-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        /* Карточка тира */
        .tier-card {
            background: #1a1e24;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: slideUp 0.5s ease;
            border: 1px solid #2a2f38;
        }

        .tier-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 60px rgba(0,255,255,0.1);
            border-color: #64b5f6;
        }

        .tier-header {
            padding: 25px;
            text-align: center;
            color: white;
            border-bottom: 1px solid #2a2f38;
        }

        .tier-1 .tier-header {
            background: linear-gradient(135deg, #1e3a5f 0%, #0a1a2a 100%);
        }

        .tier-2 .tier-header {
            background: linear-gradient(135deg, #2a2f38 0%, #1a1e24 100%);
        }

        .tier-3 .tier-header {
            background: linear-gradient(135deg, #1e3a3a 0%, #0a1a1a 100%);
        }

        .tier-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .tier-desc {
            font-size: 14px;
            opacity: 0.7;
            color: #8099a7;
        }

        /* Список игроков */
        .players-list {
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
        }

        .player-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: #0f1319;
            border-radius: 12px;
            margin-bottom: 8px;
            transition: all 0.2s ease;
            animation: fadeIn 0.3s ease;
            border: 1px solid #2a2f38;
        }

        .player-item:hover {
            background: #1e242c;
            transform: translateX(5px);
            border-color: #64b5f6;
        }

        .player-rank {
            width: 30px;
            height: 30px;
            background: #64b5f6;
            color: #0a0c0f;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            margin-right: 15px;
        }

        .tier-1 .player-rank {
            background: #64b5f6;
        }

        .tier-2 .player-rank {
            background: #9aa9b9;
        }

        .tier-3 .player-rank {
            background: #4a6572;
        }

        .player-name {
            flex: 1;
            font-weight: 500;
            color: #ffffff;
            font-size: 15px;
        }

        /* Скроллбар под темную тему */
        .players-list::-webkit-scrollbar {
            width: 6px;
        }

        .players-list::-webkit-scrollbar-track {
            background: #0f1319;
            border-radius: 10px;
        }

        .players-list::-webkit-scrollbar-thumb {
            background: #2a2f38;
            border-radius: 10px;
        }

        .players-list::-webkit-scrollbar-thumb:hover {
            background: #3a404b;
        }

        /* Анимации */
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Футер */
        .footer {
            text-align: center;
            margin-top: 50px;
            color: #8099a7;
            font-size: 14px;
        }

        .update-time {
            background: #1a1e24;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid #2a2f38;
        }

        /* Адаптивность */
        @media (max-width: 900px) {
            .tiers-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            h1 {
                font-size: 36px;
            }

            .stats {
                flex-direction: column;
                gap: 15px;
                align-items: center;
            }

            .stat-card {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Шапка -->
        <div class="header">
            <h1>РАСПРЕДЕЛЕНИЕ ПО ТИРАМ</h1>
            <div class="subtitle">Текущий состав игроков</div>
        </div>

        <!-- Статистика -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalPlayers">27</div>
                <div class="stat-label">Всего игроков</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="tier1Count">9</div>
                <div class="stat-label">Tier 1</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="tier2Count">9</div>
                <div class="stat-label">Tier 2</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="tier3Count">9</div>
                <div class="stat-label">Tier 3</div>
            </div>
        </div>

        <!-- Тиры -->
        <div class="tiers-grid" id="tiersContainer">
            <!-- Tier 1 -->
            <div class="tier-card tier-1">
                <div class="tier-header">
                    <div class="tier-name">TIER 1</div>
                    <div class="tier-desc">Элитный дивизион</div>
                </div>
                <div class="players-list" id="tier1List">
                    <!-- Сюда вставятся игроки скриптом -->
                </div>
            </div>

            <!-- Tier 2 -->
            <div class="tier-card tier-2">
                <div class="tier-header">
                    <div class="tier-name">TIER 2</div>
                    <div class="tier-desc">Основной состав</div>
                </div>
                <div class="players-list" id="tier2List">
                    <!-- Сюда вставятся игроки скриптом -->
                </div>
            </div>

            <!-- Tier 3 -->
            <div class="tier-card tier-3">
                <div class="tier-header">
                    <div class="tier-name">TIER 3</div>
                    <div class="tier-desc">Развивающийся состав</div>
                </div>
                <div class="players-list" id="tier3List">
                    <!-- Сюда вставятся игроки скриптом -->
                </div>
            </div>
        </div>

        <!-- Футер -->
        <div class="footer">
            <div class="update-time">
                🔄 Обновлено: <span id="updateTime"></span>
            </div>
        </div>
    </div>

    <script>
        // Твой список игроков
        const players = [
            "dyaleo57", "hal98", "shad1w", "noteflight", "Shio",
            "iKannaTense", "RoiNest", ".DmiVob.", "xarlauss", "ZawaZawa",
            "kyrksha", "kapkaka", "Gibson", "force.major", "TUY",
            "grofine", "Rene", "dima_rusin", "Anlo", "JakeLife",
            "HornyRatio", "tetsuyabtw", "kykan_velikana", "Kazuto", "Abeno",
            "Sephira", "Flavik", "hiyori"
        ];

        // Функция для случайного распределения
        function distributePlayers(players) {
            // Перемешиваем массив
            const shuffled = [...players].sort(() => Math.random() - 0.5);
            
            // Делим на 3 примерно равные части
            const chunkSize = Math.ceil(shuffled.length / 3);
            const tier1 = shuffled.slice(0, chunkSize);
            const tier2 = shuffled.slice(chunkSize, chunkSize * 2);
            const tier3 = shuffled.slice(chunkSize * 2);
            
            return { tier1, tier2, tier3 };
        }

        // Функция для отображения игроков
        function displayPlayers() {
            const distribution = distributePlayers(players);
            
            // Обновляем счетчики
            document.getElementById('totalPlayers').textContent = players.length;
            document.getElementById('tier1Count').textContent = distribution.tier1.length;
            document.getElementById('tier2Count').textContent = distribution.tier2.length;
            document.getElementById('tier3Count').textContent = distribution.tier3.length;
            
            // Функция для отрисовки списка
            function renderList(elementId, players, startRank = 1) {
                const list = document.getElementById(elementId);
                list.innerHTML = '';
                
                // Сортируем по алфавиту для красоты
                players.sort((a, b) => a.localeCompare(b));
                
                players.forEach((player, index) => {
                    const playerItem = document.createElement('div');
                    playerItem.className = 'player-item';
                    playerItem.innerHTML = `
                        <div class="player-rank">${startRank + index}</div>
                        <span class="player-name">${player}</span>
                    `;
                    list.appendChild(playerItem);
                });
            }
            
            // Отрисовываем все тиры
            renderList('tier1List', distribution.tier1, 1);
            renderList('tier2List', distribution.tier2, 1);
            renderList('tier3List', distribution.tier3, 1);
            
            // Обновляем время
            const now = new Date();
            document.getElementById('updateTime').textContent = 
                now.toLocaleString('ru-RU', { 
                    day: '2-digit', 
                    month: '2-digit', 
                    year: 'numeric',
                    hour: '2-digit', 
                    minute: '2-digit' 
                });
        }

        // Запускаем при загрузке
        displayPlayers();
    </script>
</body>
</html>
